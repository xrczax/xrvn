<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-indigo-950 to-sky-900 flex items-center justify-center p-6">
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute -top-24 -left-24 h-72 w-72 rounded-full bg-cyan-400/20 blur-3xl"></div>
    <div class="absolute top-1/3 -right-20 h-80 w-80 rounded-full bg-fuchsia-500/20 blur-3xl"></div>
    <div class="absolute bottom-0 left-1/3 h-72 w-72 rounded-full bg-indigo-400/20 blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-md">
    <div class="rounded-3xl border border-white/10 bg-white/10 backdrop-blur-xl shadow-2xl shadow-black/30">
      <div class="p-8 sm:p-10">
        <div class="mb-8 text-center">
          <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-white/15 ring-1 ring-white/20">
            <svg class="h-7 w-7 text-white" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V7.875a4.5 4.5 0 10-9 0V10.5m-1.125 0h11.25A1.875 1.875 0 0119.5 12.375v6.75A1.875 1.875 0 0117.625 21h-11.25A1.875 1.875 0 014.5 19.125v-6.75A1.875 1.875 0 016.375 10.5z" />
            </svg>
          </div>
          <h1 class="text-3xl font-bold tracking-tight text-white">Welcome Back</h1>
          <p class="mt-2 text-sm text-slate-200/80">Sign in to access your account securely</p>
        </div>

        <form class="space-y-5" action="#" method="POST" novalidate>
          <div>
            <label for="email" class="mb-2 block text-sm font-medium text-white">Email</label>
            <div class="relative">
              <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-slate-300">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5A2.25 2.25 0 0119.5 19.5h-15A2.25 2.25 0 012.25 17.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15A2.25 2.25 0 002.25 6.75m19.5 0l-8.69 5.52a2.25 2.25 0 01-2.12 0L2.25 6.75" />
                </svg>
              </span>
              <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                required
                placeholder="you@example.com"
                class="w-full rounded-2xl border border-white/10 bg-white/10 py-3.5 pl-12 pr-4 text-white placeholder-slate-300/70 outline-none transition focus:border-cyan-300 focus:ring-2 focus:ring-cyan-400/40"
              />
            </div>
          </div>

          <div>
            <div class="mb-2 flex items-center justify-between">
              <label for="password" class="block text-sm font-medium text-white">Password</label>
              <a href="#" class="text-sm font-medium text-cyan-300 transition hover:text-cyan-200">
                Forgot Password?
              </a>
            </div>

            <div class="relative">
              <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-slate-300">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V7.875a4.5 4.5 0 10-9 0V10.5m-1.125 0h11.25A1.875 1.875 0 0119.5 12.375v6.75A1.875 1.875 0 0117.625 21h-11.25A1.875 1.875 0 014.5 19.125v-6.75A1.875 1.875 0 016.375 10.5z" />
                </svg>
              </span>

              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
                placeholder="Enter your password"
                class="w-full rounded-2xl border border-white/10 bg-white/10 py-3.5 pl-12 pr-14 text-white placeholder-slate-300/70 outline-none transition focus:border-cyan-300 focus:ring-2 focus:ring-cyan-400/40"
              />

              <button
                type="button"
                id="togglePassword"
                class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-300 transition hover:text-white"
                aria-label="Toggle password visibility"
              >
                <svg id="eyeOpen" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.644C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.21.07.434 0 .644C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg id="eyeClosed" class="hidden h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M10.73 5.08A10.45 10.45 0 0112 4.5c4.638 0 8.573 3.007 9.963 7.178.07.21.07.434 0 .644a10.48 10.48 0 01-4.043 5.362M6.61 6.61A10.48 10.48 0 002.036 11.678a1.012 1.012 0 000 .644C3.423 16.49 7.36 19.5 12 19.5a10.45 10.45 0 005.39-1.49M9.88 9.88a3 3 0 104.24 4.24" />
                </svg>
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-3 text-slate-200">
              <input
                type="checkbox"
                class="h-4 w-4 rounded border-white/20 bg-white/10 text-cyan-400 focus:ring-cyan-400/40"
              />
              <span>Remember me</span>
            </label>
          </div>

          <button
            type="submit"
            class="w-full rounded-2xl bg-gradient-to-r from-cyan-400 to-blue-500 px-4 py-3.5 text-sm font-semibold text-slate-950 shadow-lg shadow-cyan-900/30 transition hover:scale-[1.01] hover:from-cyan-300 hover:to-blue-400 focus:outline-none focus:ring-2 focus:ring-cyan-300 focus:ring-offset-2 focus:ring-offset-transparent"
          >
            Sign In
          </button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-200/80">
          Don’t have an account?
          <a href="#" class="font-medium text-cyan-300 transition hover:text-cyan-200">Create one</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('password');
    const eyeOpen = document.getElementById('eyeOpen');
    const eyeClosed = document.getElementById('eyeClosed');

    togglePassword.addEventListener('click', () => {
      const isHidden = password.type === 'password';
      password.type = isHidden ? 'text' : 'password';
      eyeOpen.classList.toggle('hidden', isHidden);
      eyeClosed.classList.toggle('hidden', !isHidden);
    });
  </script>
</body>
</html>
